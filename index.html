<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="scorebar" aria-label="Spielstand">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="bestScore">0</strong>
        </div>
        <button id="pauseButton" type="button">Pause</button>
      </section>

      <canvas id="game" width="480" height="480" aria-label="Snake Spielfeld"></canvas>

      <section class="controls" aria-label="Steuerung">
        <button type="button" data-direction="up" aria-label="Nach oben">&uarr;</button>
        <div>
          <button type="button" data-direction="left" aria-label="Nach links">&larr;</button>
          <button type="button" data-direction="down" aria-label="Nach unten">&darr;</button>
          <button type="button" data-direction="right" aria-label="Nach rechts">&rarr;</button>
        </div>
      </section>

      <p id="message" class="message">Druecke eine Pfeiltaste oder tippe eine Richtung.</p>
      <button id="restartButton" class="restart" type="button">Neues Spiel</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
